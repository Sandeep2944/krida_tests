name: KRIDA Automated Tests
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * *'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        pip install selenium webdriver-manager
    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
    - name: Run Tests
      run: |
        python bug_finder_ci.py